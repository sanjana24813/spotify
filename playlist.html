<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#121212;
      color:white;
      font-family: Arial, sans-serif;
    }

    .header{
      background: linear-gradient(#1DB954,#121212);
      padding:30px;
      text-align:center;
    }

    .song{
      background:#2a2a2a;
      border-radius:10px;
      padding:10px;
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .song img{
      width:60px;
      height:60px;
      border-radius:8px;
      object-fit:cover;
      margin-right:10px;
    }

    .song-left{
      display:flex;
      align-items:center;
    }

    button{
      background:#1DB954;
      border:none;
      padding:8px 15px;
      border-radius:20px;
      color:white;
    }

    button:hover{
      opacity:0.8;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>My Playlist</h1>
</div>

<div class="container mt-4" id="songList"></div>

<script>

let songs = [
  {name:"Song 1", img:"images/1.jpg", audio:"audio/1.mp3"},
  {name:"Song 2", img:"images/2.jpg", audio:"audio/2.mp3"},
  {name:"Song 3", img:"images/3.jpg", audio:"audio/3.mp3"},
  {name:"Song 4", img:"images/4.jpg", audio:"audio/4.mp3"},
  {name:"Song 5", img:"images/5.jpg", audio:"audio/5.mp3"},
  {name:"Song 6", img:"images/6.jpg", audio:"audio/6.mp3"}
];

let songList = document.getElementById("songList");

songs.forEach(song => {

  let div = document.createElement("div");
  div.classList.add("song");

  div.innerHTML = `
    <div class="song-left">
      <img src="${song.img}">
      <div>
        <h5>${song.name}</h5>
      </div>
    </div>

    <button onclick="playSong('${song.audio}')">
      Play
    </button>
  `;

  songList.appendChild(div);
});

let audio = new Audio();

function playSong(songPath){
  audio.src = songPath;
  audio.play();
}

</script>

</body>
</html>
